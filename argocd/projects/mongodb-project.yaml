apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: mongodb
  namespace: argocd

spec:
  sourceRepos:
    - '*'

  destinations:
    - namespace: mongodb
      server: https://kubernetes.default.svc
    - namespace: mongodb-operator
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
